info:
  name: Read Badge Rule errors when id is not int
  type: http
  seq: 4

http:
  method: GET
  url: "{{HOST}}/api/v2/badge-rules.php?id=Illuminator"
  params:
    - name: id
      value: Illuminator
      type: query

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: eq
      value: The badge rule id must be specified as an integer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
