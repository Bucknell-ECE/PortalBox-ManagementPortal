info:
  name: Use Proxy Card
  type: http
  seq: 4

http:
  method: POST
  url: "{{HOST}}/api/v2/box-activation.php?mac={{MAC_ADDRESS}}"
  params:
    - name: mac
      value: "{{MAC_ADDRESS}}"
      type: query
  body:
    type: json
    data: '{"card": "{{PROXY_CARD_ID}}"}'
  auth:
    type: bearer
    token: "{{AUTHORIZED_USER_CARD_ID}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: eq
      value: proxy

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
