info:
  name: Activate
  type: http
  seq: 3

http:
  method: PUT
  url: "{{HOST}}/api/v2/box-activation.php?mac={{MAC_ADDRESS}}"
  params:
    - name: mac
      value: "{{MAC_ADDRESS}}"
      type: query
  auth:
    type: bearer
    token: "{{AUTHORIZED_USER_CARD_ID}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
