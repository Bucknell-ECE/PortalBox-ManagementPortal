info:
  name: Read Equipment errors when id in not int
  type: http
  seq: 5

http:
  method: GET
  url: "{{HOST}}/api/v2/equipment.php?id=Flashlight"
  params:
    - name: id
      value: Flashlight
      type: query

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: eq
      value: The equipment id must be specified as an integer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
