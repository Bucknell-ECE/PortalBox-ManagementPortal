info:
  name: Read Charge errors when id is not int
  type: http
  seq: 5

http:
  method: GET
  url: "{{HOST}}/api/v2/charges.php?id=time using 3D printer"
  params:
    - name: id
      value: time using 3D printer
      type: query

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: eq
      value: The charge id must be specified as an integer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
