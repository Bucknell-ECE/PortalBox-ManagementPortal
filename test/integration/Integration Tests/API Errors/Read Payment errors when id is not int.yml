info:
  name: Read Payment errors when id is not int
  type: http
  seq: 14

http:
  method: GET
  url: "{{HOST}}/api/v2/payments.php?id=I paid you back last week"
  params:
    - name: id
      value: I paid you back last week
      type: query

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: eq
      value: The payment id must be specified as an integer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
