info:
  name: Read Equiment Type errors when id is not int
  type: http
  seq: 8

http:
  method: GET
  url: "{{HOST}}/api/v2/equipment-types.php?id=Flashlight"
  params:
    - name: id
      value: Flashlight
      type: query

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: eq
      value: The equipment type id must be specified as an integer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
