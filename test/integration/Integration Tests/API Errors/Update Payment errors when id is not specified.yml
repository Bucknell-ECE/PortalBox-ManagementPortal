info:
  name: Update Payment errors when id is not specified
  type: http
  seq: 15

http:
  method: POST
  url: "{{HOST}}/api/v2/payments.php"
  body:
    type: json
    data: '{"user_id":2,"time":"2026-03-25 10:10:23","amount":"23.56"}'

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: eq
      value: You must specify the payment to modify via the id param

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
