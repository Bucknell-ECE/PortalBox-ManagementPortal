info:
  name: Update User errors when id is not specified
  type: http
  seq: 21

http:
  method: POST
  url: "{{HOST}}/api/v2/users.php"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: eq
      value: You must specify the user to modify via the id param

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
