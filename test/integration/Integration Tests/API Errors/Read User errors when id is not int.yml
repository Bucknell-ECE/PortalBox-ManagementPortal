info:
  name: Read User errors when id is not int
  type: http
  seq: 20

http:
  method: GET
  url: "{{HOST}}/api/v2/users.php?id=Admin"
  params:
    - name: id
      value: Admin
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: eq
      value: The user must be specified as an integer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
