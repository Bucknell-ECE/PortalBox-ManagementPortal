info:
  name: Update Equipment errors when id is not int
  type: http
  seq: 7

http:
  method: POST
  url: "{{HOST}}/api/v2/equipment.php?id=3D Printer"
  params:
    - name: id
      value: 3D Printer
      type: query
  body:
    type: json
    data: |-
      {
          "name": "DANA 105 GlowForge",
          "type_id": 54,
          "mac_address": "01-23-45-67-89-AB",
          "location_id": 74,
          "timeout": 0,
          "service_minutes": 60,
          "in_service": true
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: eq
      value: You must specify the equipment to modify via the id param

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
