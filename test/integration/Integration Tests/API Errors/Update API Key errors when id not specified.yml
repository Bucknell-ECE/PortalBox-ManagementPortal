info:
  name: Update API Key errors when id not specified
  type: http
  seq: 2

http:
  method: POST
  url: "{{HOST}}/api/v2/api-keys.php"
  body:
    type: json
    data: '{"id":-1, "name":"Reservations Integration"}'

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: eq
      value: You must specify the API key to modify via the id param

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
